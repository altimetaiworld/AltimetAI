<!-- app/templates/components/booking-success.html -->
<div class="glass-panel border-green-500/30 rounded-2xl p-8 bg-green-50/20 dark:bg-green-950/10 text-center space-y-5 max-w-md mx-auto">
  <div class="inline-flex items-center justify-center p-3 rounded-full bg-green-500/10 text-green-500">
    <svg class="h-10 w-10 animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
    </svg>
  </div>
  <div>
    <h3 class="text-2xl font-bold text-gray-900 dark:text-white font-display">Session Reserved!</h3>
    <p class="text-xs text-gray-400 mt-1">Confirmation code: {{ code }}</p>
  </div>
  <div class="p-4 bg-white/70 dark:bg-gray-900/70 border border-gray-200 dark:border-gray-800 rounded-xl space-y-2 text-sm text-left">
    <p class="text-gray-500 dark:text-gray-400">Host: <span class="font-semibold text-gray-900 dark:text-white">Altimet AI Engineering</span></p>
    <p class="text-gray-500 dark:text-gray-400">Topic: <span class="font-semibold text-gray-900 dark:text-white">Technical Discovery Session</span></p>
    <p class="text-gray-500 dark:text-gray-400">Date: <span class="font-semibold text-gray-900 dark:text-white">{{ date }}</span></p>
    <p class="text-gray-500 dark:text-gray-400">Time: <span class="font-semibold text-gray-900 dark:text-white">{{ time }} EST</span></p>
  </div>
  <p class="text-xs text-gray-500 dark:text-gray-400 leading-relaxed">
    We have emailed a calendar invite containing the MS Teams link and discovery audit document to your inbox.
  </p>
</div>
