<!-- app/templates/components/architecture.html -->
<div class="glass-panel border-gray-200 dark:border-gray-800 rounded-2xl p-6 lg:p-8 bg-white/70 dark:bg-gray-950/70 shadow-xl transition-colors duration-300">
  <div class="text-center max-w-xl mx-auto mb-10">
    <span class="text-xs font-semibold uppercase tracking-wider text-indigo-600 dark:text-indigo-400 font-display">System Blueprint</span>
    <h3 class="text-2xl font-bold text-gray-900 dark:text-white mt-1">Enterprise Deployment Architecture</h3>
    <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">Fully sandboxed, high-performance RAG and agent orchestration pipelines deployed inside your secure cloud perimeter.</p>
  </div>

  <!-- SVG Architecture Flow -->
  <div class="relative w-full overflow-x-auto">
    <svg class="mx-auto min-w-[700px] h-[340px]" viewBox="0 0 800 360" fill="none">
      
      <!-- Defs for markers and glows -->
      <defs>
        <!-- Linear Gradients for Nodes -->
        <linearGradient id="gradient-blue" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#3B82F6"/>
          <stop offset="100%" stop-color="#1D4ED8"/>
        </linearGradient>
        <linearGradient id="gradient-purple" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#6366F1"/>
          <stop offset="100%" stop-color="#8B5CF6"/>
        </linearGradient>
        <linearGradient id="gradient-green" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#10B981"/>
          <stop offset="100%" stop-color="#047857"/>
        </linearGradient>
        <linearGradient id="gradient-gray" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#6B7280"/>
          <stop offset="100%" stop-color="#374151"/>
        </linearGradient>
        
        <!-- Signal Path Gradient -->
        <linearGradient id="signal-grad" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
          <stop stop-color="#6366F1" stop-opacity="0.1"/>
          <stop offset="50%" stop-color="#8B5CF6" stop-opacity="1"/>
          <stop offset="100%" stop-color="#10B981" stop-opacity="0.1"/>
        </linearGradient>

        <!-- Custom glow filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="6" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
      </defs>

      <!-- Security Bounds / VPC Outline -->
      <rect x="180" y="30" width="590" height="300" rx="16" stroke="rgba(99, 102, 241, 0.15)" stroke-width="2" stroke-dasharray="6 6" fill="rgba(99, 102, 241, 0.01)"/>
      <text x="200" y="55" fill="rgba(156, 163, 175, 0.6)" class="font-display text-[10px] uppercase font-bold tracking-widest">Secure VPC Border</text>

      <!-- Network Connections (Lines) -->
      <!-- UI -> Gateway -->
      <path d="M 120 180 L 220 180" stroke="url(#signal-grad)" stroke-width="2" stroke-linecap="round"/>
      <!-- Gateway -> LLM Pipeline -->
      <path d="M 320 180 L 420 180" stroke="url(#signal-grad)" stroke-width="2" stroke-linecap="round"/>
      <!-- LLM Pipeline -> Database -->
      <path d="M 520 150 L 620 100" stroke="rgba(156, 163, 175, 0.3)" stroke-width="1.5" stroke-dasharray="4 4"/>
      <!-- LLM Pipeline -> Vector Store -->
      <path d="M 520 210 L 620 260" stroke="rgba(156, 163, 175, 0.3)" stroke-width="1.5" stroke-dasharray="4 4"/>
      
      <!-- Connection pulsing signal animation -->
      <path d="M 120 180 L 720 180" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="15 150" stroke-linecap="round" class="pulse-flow-path"/>

      <!-- Nodes -->
      
      <!-- Node 1: Client Frontend UI -->
      <g class="cursor-pointer hover:opacity-90 transition">
        <rect x="20" y="130" width="100" height="100" rx="12" fill="url(#gradient-blue)" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.05))"/>
        <text x="70" y="175" fill="#fff" text-anchor="middle" font-weight="bold" class="font-display text-xs">CLIENT UI</text>
        <text x="70" y="195" fill="rgba(255,255,255,0.7)" text-anchor="middle" class="text-[9px]">Tailwind / JS</text>
      </g>

      <!-- Node 2: Flask/Python API Gateway -->
      <g class="cursor-pointer hover:opacity-90 transition">
        <rect x="220" y="130" width="100" height="100" rx="12" fill="url(#gradient-gray)"/>
        <text x="270" y="175" fill="#fff" text-anchor="middle" font-weight="bold" class="font-display text-xs">API ROUTER</text>
        <text x="270" y="195" fill="rgba(255,255,255,0.7)" text-anchor="middle" class="text-[9px]">Flask / WSGI</text>
      </g>

      <!-- Node 3: AI Reasoning / LangGraph (Center Piece) -->
      <g class="cursor-pointer hover:opacity-90 transition" filter="url(#glow)">
        <rect x="420" y="110" width="110" height="140" rx="16" fill="url(#gradient-purple)"/>
        <text x="475" y="165" fill="#fff" text-anchor="middle" font-weight="bold" class="font-display text-xs">AI ENGINE</text>
        <text x="475" y="185" fill="rgba(255,255,255,0.8)" text-anchor="middle" class="text-[9px]">LangGraph Orchestrator</text>
        <text x="475" y="205" fill="rgba(255,255,255,0.8)" text-anchor="middle" class="text-[9px]">Model Fine-Tuning</text>
        <text x="475" y="225" fill="rgba(255,255,255,0.8)" text-anchor="middle" class="text-[9px]">PII Scrubbing</text>
      </g>

      <!-- Node 4a: Structured Database -->
      <g class="cursor-pointer hover:opacity-90 transition">
        <rect x="620" y="50" width="100" height="80" rx="12" fill="url(#gradient-green)"/>
        <text x="670" y="90" fill="#fff" text-anchor="middle" font-weight="bold" class="font-display text-xs">WAREHOUSE</text>
        <text x="670" y="110" fill="rgba(255,255,255,0.7)" text-anchor="middle" class="text-[9px]">Snowflake / Postgres</text>
      </g>

      <!-- Node 4b: Vector Database -->
      <g class="cursor-pointer hover:opacity-90 transition">
        <rect x="620" y="230" width="100" height="80" rx="12" fill="url(#gradient-green)"/>
        <text x="670" y="270" fill="#fff" text-anchor="middle" font-weight="bold" class="font-display text-xs">VECTOR INDEX</text>
        <text x="670" y="290" fill="rgba(255,255,255,0.7)" text-anchor="middle" class="text-[9px]">Qdrant / pgvector</text>
      </g>

      <!-- Observability Overlay -->
      <rect x="350" y="290" width="250" height="30" rx="6" fill="rgba(16, 185, 129, 0.1)" stroke="#10B981" stroke-width="1"/>
      <text x="475" y="309" fill="#10B981" text-anchor="middle" font-size="10" font-weight="bold" class="font-display">REAL-TIME MONITORING: Latency logs, token bounds & audit logs</text>

    </svg>
  </div>
</div>

<style>
  @keyframes flow-pulse {
    0% { stroke-dashoffset: 800; }
    100% { stroke-dashoffset: 0; }
  }
  .pulse-flow-path {
    animation: flow-pulse 5s linear infinite;
  }
</style>
